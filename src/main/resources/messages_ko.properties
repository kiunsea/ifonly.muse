page.guide.intro.heading=Muse 는 무엇인가
page.guide.intro.p1=<strong>Muse Agent</strong> 는 if-only Echo 서비스의 PC 동반 에이전트입니다. Windows 데스크톱에 Windows 서비스로 설치되어, Echo 서비스의 일부 기능을 사용자의 로컬 환경에서 보조합니다.
page.guide.intro.p2=가장 큰 역할은 <strong>Echo Note (잔잔한 물결)</strong> 의 강화 privacy 보관 경로를 제공하는 것이에요. 메시지 본문이 echo 서버가 아닌 사용자 PC 에만 저장되고, 발송 시점에만 echo 가 잠깐 받아 대신 전송하는 구조입니다.
page.guide.privacy.heading=강화 privacy 모델
page.guide.privacy.intro=Echo Note (잔잔한 물결) 본문은 다음 경로로만 흐릅니다:
page.guide.privacy.li1=<strong>보관</strong>: 사용자 PC 의 muse-agent SQLite (<code>%APPDATA%\ifonly-muse\muse-agent.db</code>) 만
page.guide.privacy.li2=<strong>발송 시점</strong>: muse 가 echo 의 외부 API 로 가공본을 전달, echo 는 즉시 발송 후 본문 폐기
page.guide.privacy.li3=<strong>echo 의 송신 로그</strong>: 메타 정보 (수신자·제목·발송 결과) 만 잔존, 본문은 미저장
page.guide.privacy.outro=OAuth2 자격증명은 Windows DPAPI 로 암호화된 secure-config 파일에 보관돼요. muse 의 echo 발송 성공 로그는 수신자 이메일을 평문이 아닌 SHA-256 해시 (앞 12자) 로만 기록해 PII 노출을 막습니다.
page.guide.flows.heading=주요 사용 흐름
page.guide.flows.scenarioA.title=📨 시나리오 A — Echo Note (잔잔한 물결) 보관·발송
page.guide.flows.scenarioA.li1=echo popup 의 "PC 보관" 분기로 진입 (자격증명 자동 교환됨)
page.guide.flows.scenarioA.li2=대시보드에서 [+새로 보관하기] 또는 작성 form 사용
page.guide.flows.scenarioA.li3=[미리보기 ✨] 로 가공본 미리 확인 → [이대로 보관] 하면 DRAFT 로 저장
page.guide.flows.scenarioA.li4=[마침 처리] 누르면 자동 발송 예약 (3~6 개월 사이 임의 일자, 사용자에게 정확한 일시 비공개)
page.guide.flows.scenarioA.li5=또는 [echo 발송] 으로 즉시 수동 발송 가능 (테스트·긴급용)
page.guide.flows.scenarioB.title=🌡️ 시나리오 B — Alive 모니터링 + 자동 정리
page.guide.flows.scenarioB.li1=Alive-Check 스케줄러가 일정 주기 (기본 10분) 마다 echo 의 alive 상태 폴링
page.guide.flows.scenarioB.li2=EXPIRED 상태가 임계 일수 (기본 7일) 이상 지속되면 등록된 cleanup 경로의 파일을 휴지통으로 이동
page.guide.flows.scenarioB.li3=매 폴링 cycle 마다 휴지통 안 보관 기간 지난 항목은 영구 삭제 (자동 만료 purge)
page.guide.flows.scenarioB.note=설정은 시스템 패널 → 작업 설정 관리에서 변경.
page.guide.flows.scenarioC.title=🗑️ 시나리오 C — 휴지통 수동 관리
page.guide.flows.scenarioC.li1=시스템 패널 → 휴지통 수동 관리 → 보관 항목 조회
page.guide.flows.scenarioC.li2=실수로 정리된 파일은 [복원]; 즉시 비우려면 [즉시 만료 삭제]
page.guide.flows.scenarioC.li3=전체 즉시 purge 는 [Purge Now] 버튼 (alive-check 와 무관하게 강제 실행)
page.guide.features.heading=기능 카탈로그
page.guide.features.bucket.echo=echo 서비스 연동 / echo 동작에 종속
page.guide.features.bucket.standalone=에이전트 단독으로 동작
page.guide.features.echoNote.title=Echo Note (잔잔한 물결) 보관함
page.guide.features.echoNote.beta=베타
page.guide.features.echoNote.summary=메시지 본문이 사용자 PC 에만 저장되는 강화 privacy 메시지 보관함.
page.guide.features.echoNote.li1=작성 / 편집 / 삭제 / DRAFT ↔ READY 상태 전환
page.guide.features.echoNote.li2=AI 프리뷰 (echo 외부 API 호출) — DB 저장 전 inline preview 가능
page.guide.features.echoNote.li3=마침 처리 시 3~6 개월 사이 임의 일자로 자동 발송 예약
page.guide.features.echoNote.li4=[echo 발송] 버튼으로 즉시 수동 발송 (테스트·긴급용)
page.guide.features.alive.title=Alive-Check 모니터링
page.guide.features.alive.desc=echo 서버의 alive 상태를 정기 폴링하고 EXPIRED 임계 도달 여부를 추적합니다. 폴링 주기와 임계 일수는 작업 설정에서 변경 가능.
page.guide.features.device.title=디바이스 등록·재등록
page.guide.features.device.desc=echo 서비스에 본 PC 를 등록·재등록·해제. 시스템 패널 → 디바이스 관리에서 진행.
page.guide.features.credential.title=Echo Server 자격증명 관리
page.guide.features.credential.desc=OAuth2 client credentials (URL / Client ID / Client Secret). echo popup 의 "PC 보관" 분기 진입 시 continuation token 으로 자동 교환되며, 직접 입력도 가능합니다.
page.guide.features.cleanupAuto.title=파일 정리 자동 실행
page.guide.features.cleanupAuto.desc=alive 상태가 EXPIRED 임계에 도달하면 등록된 cleanup 경로의 파일을 휴지통으로 자동 이동 (echo 가 EXPIRED 를 반환해야 트리거).
page.guide.features.trashAutoPurge.title=휴지통 자동 만료 purge
page.guide.features.trashAutoPurge.desc=Alive-Check 스케줄러의 매 폴링 cycle 마다 보관 기간 지난 휴지통 항목을 영구 삭제. echo 응답 자체는 무관, 폴링이 돌고 있기만 하면 됩니다.
page.guide.features.trashManual.title=휴지통 수동 관리
page.guide.features.trashManual.desc=보관 항목 조회·복원·즉시 만료 삭제. echo 가 죽어 있어도 동작.
page.guide.features.cleanupPath.title=Cleanup 경로 등록
page.guide.features.cleanupPath.desc=자동 정리 대상 경로 등록·편집·기록·쓰기 권한 검증.
page.guide.features.taskHistory.title=작업 수행 이력
page.guide.features.taskHistory.desc=모든 자동/수동 작업의 상세 로그. 그룹·작업 키·상태·기간 필터, 정렬, 상세 modal 제공.
page.guide.features.localSettings.title=자체 설정
page.guide.features.localSettings.desc=Alive-Check 폴링 주기, 휴지통 보관 기간, purge 배치 크기 등.
page.guide.data.heading=데이터·운영
page.guide.data.localDb.label=로컬 DB
page.guide.data.secureConfig.label=Secure config (DPAPI 암호화)
page.guide.data.secureConfig.value=echo OAuth2 자격증명
page.guide.data.port.label=기본 포트
page.guide.data.api.label=echo external API
page.guide.data.api.value=unversioned (현재)
page.guide.data.note=부팅 시 <code>Echo external API contract: muse expects version='unversioned'</code> 가 INFO 로그로 노출돼 호환 상태를 확인할 수 있어요. echo 가 향후 <code>/v1/</code> prefix 도입 시 새 muse 릴리즈가 <code>application.yml</code> 갱신만으로 대응합니다.
page.guide.roadmap.heading=향후 계획
page.guide.roadmap.intro=검증·다듬기 진행 중이거나 향후 도입 예정인 항목:
page.guide.roadmap.li1=<strong>Echo Note (잔잔한 물결) 보관함 — 베타 → 정식</strong>: AI 프리뷰·자동 발송 흐름 동작 중, 실 사용 시나리오 검증 진행. 안정화되면 베타 표기 제거.
page.guide.roadmap.li2=<strong>자체 작업 스케줄링</strong>: 파일 정리·휴지통 purge 등의 사용자 정의 cron 류 주기 설정. 현재는 Alive-Check 트리거에 종속.
page.guide.roadmap.li3=<strong>파일 정리 수동 실행 트리거</strong>: Alive-Check 와 무관하게 즉시 실행 가능한 수동 버튼/엔드포인트.
page.guide.roadmap.li4=<strong>외부 기여 정책</strong>: <code>CONTRIBUTING.md</code> 에 게시 예정.
page.guide.roadmap.changelog=상세한 변경 이력은 <a href="https://github.com/kiunsea/ifonly.muse/blob/main/CHANGELOG.md" target="_blank" rel="noopener">CHANGELOG.md</a> 에서 확인할 수 있습니다.
