spring:
  application:
    name: muse-agent

  datasource:
    url: jdbc:sqlite:${DB_PATH:data/muse-agent.db}
    driver-class-name: org.sqlite.JDBC

server:
  port: 8484
  servlet:
    context-path: /

# Echo Server Configuration
app:
  echo-server:
    url: ${ECHO_SERVER_URL:https://echo-server.omnibuscode.com}
    client-id: ${ECHO_SERVER_CLIENT_ID:soul-keeper-client}
    client-secret: ${ECHO_SERVER_CLIENT_SECRET:soul-keeper-secret}
    api:
      device-registration: /api/devices
      alive-status: /api/alive/status
      alive-history: /api/alive/history
      echo-note-preview: /api/external/echo-note/preview
      echo-note-send: /api/external/echo-note/send
      echo-note-exchange-continuation: /api/external/echo-note/exchange-continuation-token
      # echo external API 버전. echo-server 가 /v1/ 도입 시 "v1" 로 변경하고 위 echo-note-* 경로도 함께 갱신.
      external-api-version: unversioned

  scheduler:
    alive-check:
      interval-ms: 600000             # 10분 (기본값, DB 설정으로 오버라이드 가능)
      enabled: true
      execution-threshold-days: 7     # EXPIRED 지속 임계값 (일, DB 설정으로 오버라이드 가능)

  # Encryption Configuration
  encryption:
    key: ${ENCRYPTION_KEY:}    # AES-256 암호화 키 (Base64 인코딩)

  # Secure Config File
  secure-config:
    file: ${SECURE_CONFIG_FILE:data/secure-config.properties}

# Logging
logging:
  level:
    root: INFO
    com.ifonly.museagent: DEBUG
  file:
    name: logs/muse-agent.log
    max-size: 10MB
    max-history: 30


