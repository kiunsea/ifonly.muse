page.guide.intro.heading=Muse とは
page.guide.intro.p1=<strong>Muse Agent</strong> は if-only Echo サービスの PC 用伴走エージェントです。Windows デスクトップに Windows サービスとしてインストールされ、Echo サービスの一部機能をローカル環境で補助します。
page.guide.intro.p2=最も大きな役割は <strong>Echo Note</strong> の強化プライバシー保管経路を提供することです。メッセージ本文は echo サーバーではなくユーザーの PC のみに保存され、送信時にだけ echo が一時的に受け取って代理送信する構造です。
page.guide.privacy.heading=強化プライバシーモデル
page.guide.privacy.intro=Echo Note の本文は次の経路でのみ流れます:
page.guide.privacy.li1=<strong>保管</strong>: ユーザー PC 内の muse-agent SQLite (<code>%APPDATA%\ifonly-muse\muse-agent.db</code>) のみ
page.guide.privacy.li2=<strong>送信時</strong>: muse が echo の外部 API に加工本文を送り、echo は送信後すぐに本文を破棄
page.guide.privacy.li3=<strong>echo の送信ログ</strong>: メタ情報 (受信者・件名・送信結果) のみ残存、本文は未保存
page.guide.privacy.outro=OAuth2 認証情報は Windows DPAPI で暗号化された secure-config ファイルに保管されます。muse の echo 送信成功ログは受信者メールを平文ではなく SHA-256 ハッシュ (先頭 12 桁) のみ記録し、PII の露出を防ぎます。
page.guide.flows.heading=主な使用フロー
page.guide.flows.scenarioA.title=📨 シナリオ A — Echo Note 保管・送信
page.guide.flows.scenarioA.li1=echo ポップアップの「PC 保管」分岐から進入 (認証情報は自動交換)
page.guide.flows.scenarioA.li2=ダッシュボードの [+新規保管] または作成フォームを使用
page.guide.flows.scenarioA.li3=[プレビュー ✨] で加工本文を確認 → [このまま保管] で DRAFT 保存
page.guide.flows.scenarioA.li4=[完了処理] で自動送信予約 (3〜6 か月内のランダム日、ユーザーには非表示)
page.guide.flows.scenarioA.li5=または [echo 送信] で即時手動送信 (テスト・緊急用)
page.guide.flows.scenarioB.title=🌡️ シナリオ B — Alive モニタリング + 自動整理
page.guide.flows.scenarioB.li1=Alive-Check スケジューラーが一定周期 (デフォルト 10 分) で echo の alive 状態をポーリング
page.guide.flows.scenarioB.li2=EXPIRED 状態が閾値日数 (デフォルト 7 日) 以上続くと、登録された cleanup パスのファイルをゴミ箱へ移動
page.guide.flows.scenarioB.li3=毎ポーリングサイクルで、保管期間を過ぎたゴミ箱内項目を完全削除 (自動期限切れ purge)
page.guide.flows.scenarioB.note=設定はシステムパネル → タスク設定管理から変更します。
page.guide.flows.scenarioC.title=🗑️ シナリオ C — ゴミ箱手動管理
page.guide.flows.scenarioC.li1=システムパネル → ゴミ箱手動管理 → 保管項目を確認
page.guide.flows.scenarioC.li2=誤って整理されたファイルは [復元]、即時消去は [即時期限切れ削除]
page.guide.flows.scenarioC.li3=全体即時 purge は [Purge Now] ボタン (alive-check に関係なく強制実行)
page.guide.features.heading=機能カタログ
page.guide.features.bucket.echo=echo 連携 / echo の動作に依存
page.guide.features.bucket.standalone=エージェント単独動作
page.guide.features.echoNote.title=Echo Note 保管庫
page.guide.features.echoNote.beta=ベータ
page.guide.features.echoNote.summary=メッセージ本文がユーザーの PC のみに保存される強化プライバシーメッセージ保管庫。
page.guide.features.echoNote.li1=作成 / 編集 / 削除 / DRAFT ↔ READY 遷移
page.guide.features.echoNote.li2=AI プレビュー (echo 外部 API 呼出) — DB 保存前のインラインプレビュー対応
page.guide.features.echoNote.li3=完了処理時に 3〜6 か月内のランダム日で自動送信予約
page.guide.features.echoNote.li4=[echo 送信] ボタンで即時手動送信 (テスト・緊急用)
page.guide.features.alive.title=Alive-Check モニタリング
page.guide.features.alive.desc=echo サーバーの alive 状態を定期ポーリングし、EXPIRED 閾値到達を追跡します。ポーリング周期と閾値日数はタスク設定で変更可能。
page.guide.features.device.title=デバイス登録・再登録
page.guide.features.device.desc=echo サービスに本 PC を登録・再登録・解除。システムパネル → デバイス管理から実施。
page.guide.features.credential.title=Echo Server 認証情報管理
page.guide.features.credential.desc=OAuth2 client credentials (URL / Client ID / Client Secret)。echo ポップアップの「PC 保管」分岐進入時に continuation token で自動交換され、直接入力も可能です。
page.guide.features.cleanupAuto.title=ファイル整理自動実行
page.guide.features.cleanupAuto.desc=alive 状態が EXPIRED 閾値に到達すると、登録された cleanup パスのファイルがゴミ箱へ自動移動 (echo が EXPIRED を返してこそ作動)。
page.guide.features.trashAutoPurge.title=ゴミ箱自動期限切れ purge
page.guide.features.trashAutoPurge.desc=Alive-Check スケジューラーの毎ポーリングサイクルで、保管期間を過ぎたゴミ箱項目を完全削除。echo の応答自体は無関係、ポーリングが回ってさえいれば動作します。
page.guide.features.trashManual.title=ゴミ箱手動管理
page.guide.features.trashManual.desc=保管項目の閲覧・復元・即時期限切れ削除。echo がダウンしていても動作。
page.guide.features.cleanupPath.title=Cleanup パス登録
page.guide.features.cleanupPath.desc=自動整理対象パスの登録・編集・履歴・書込権限検証。
page.guide.features.taskHistory.title=タスク実行履歴
page.guide.features.taskHistory.desc=すべての自動/手動タスクの詳細ログ。グループ・タスクキー・状態・期間でフィルター、ソート、詳細モーダル提供。
page.guide.features.localSettings.title=自前設定
page.guide.features.localSettings.desc=Alive-Check ポーリング周期、ゴミ箱保管期間、purge バッチサイズなど。
page.guide.data.heading=データ・運用
page.guide.data.localDb.label=ローカル DB
page.guide.data.secureConfig.label=Secure config (DPAPI 暗号化)
page.guide.data.secureConfig.value=echo OAuth2 認証情報
page.guide.data.port.label=デフォルトポート
page.guide.data.api.label=echo external API
page.guide.data.api.value=unversioned (現在)
page.guide.data.note=起動時に <code>Echo external API contract: muse expects version='unversioned'</code> が INFO ログに出力され、互換状態を確認できます。echo が今後 <code>/v1/</code> プレフィックスを導入する場合、新しい muse リリースは <code>application.yml</code> の更新のみで対応します。
page.guide.roadmap.heading=今後の計画
page.guide.roadmap.intro=検証・調整中、または今後導入予定の項目:
page.guide.roadmap.li1=<strong>Echo Note 保管庫 — ベータ → 正式</strong>: AI プレビュー・自動送信フローは動作中、実シナリオ検証を継続。安定したらベータ表記を外します。
page.guide.roadmap.li2=<strong>自前のタスクスケジューリング</strong>: ファイル整理・ゴミ箱 purge などのユーザー定義 cron 周期設定。現在は Alive-Check トリガー依存。
page.guide.roadmap.li3=<strong>ファイル整理手動実行トリガー</strong>: Alive-Check と無関係に即時実行できる手動ボタン/エンドポイント。
page.guide.roadmap.li4=<strong>外部貢献ポリシー</strong>: <code>CONTRIBUTING.md</code> に掲載予定。
page.guide.roadmap.changelog=詳細な変更履歴は <a href="https://github.com/kiunsea/ifonly.muse/blob/main/CHANGELOG.md" target="_blank" rel="noopener">CHANGELOG.md</a> でご確認いただけます。

