<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.task_history.title}">작업 수행 이력</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>(function(){var t=localStorage.getItem('theme-preference');if(t)document.documentElement.dataset.theme=t;})()</script>
    <link rel="stylesheet" th:href="@{/vendor/driverjs/driver.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/img/muse-agent.svg(v=${appVersion})}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico(v=${appVersion})}">
</head>
<body>
<div class="container">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div>
                <h1 class="service-title">
                    <a href="/" class="service-title-brand">
                        <img th:src="@{/img/muse-agent.svg(v=${appVersion})}" src="/img/muse-agent.svg" alt="Muse Agent" class="service-title-logo">
                        <span>Muse Agent</span>
                    </a>
                    <span class="service-title-divider">/</span>
                    <span th:text="#{page.task_history.title}">작업 수행 이력</span>
                </h1>
                <p class="subtitle" th:text="#{page.task_history.subtitle}">필터와 정렬로 상세 실행 이력을 조회합니다.</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <button id="btnStartGuide" class="btn btn-outline btn-sm" type="button"
                    th:attr="data-help-title=#{tour.muse.guide.title},data-help-desc=#{tour.muse.guide.desc}"
                    th:text="#{nav.guide_start}">가이드 시작</button>
                <button id="btnHelpMode" class="btn btn-outline btn-sm btn-help-toggle" type="button" data-help-toggle="true"
                    th:attr="data-label-show=#{page.help.toggle.show},data-label-hide=#{page.help.toggle.hide}"
                    th:text="#{page.help.toggle.show}">도움말 보기</button>
                <div class="lang-switcher">
                    <a th:href="@{''(lang='ko')}" th:classappend="${#locale.language == 'ko'} ? ' active' : ''" th:text="#{nav.lang.ko}">한국어</a>
                    <a th:href="@{''(lang='en')}" th:classappend="${#locale.language == 'en'} ? ' active' : ''" th:text="#{nav.lang.en}">EN</a>
                    <a th:href="@{''(lang='ja')}" th:classappend="${#locale.language == 'ja'} ? ' active' : ''" th:text="#{nav.lang.ja}">日本語</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="card" id="taskHistoryMainSection"
            th:attr="data-help-title=#{help.task_history.main.title},data-help-desc=#{help.task_history.main.desc},data-help-placement='bottom'">
            <h2 th:text="#{page.dashboard.section.task_history}">작업 수행 이력</h2>

            <div id="taskHistoryPresets" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;"
                th:attr="data-help-title=#{help.task_history.presets.title},data-help-desc=#{help.task_history.presets.desc},data-help-placement='bottom'">
                <button type="button" class="btn btn-outline btn-sm" onclick="applyTaskHistoryPreset('allScheduled')" th:text="#{page.task_history.btn.preset_all_scheduled}">스케줄 전체</button>
                <button type="button" class="btn btn-outline btn-sm" onclick="applyTaskHistoryPreset('alivePoll')" th:text="#{page.task_history.btn.preset_alive_poll}">Alive 체크</button>
                <button type="button" class="btn btn-outline btn-sm" onclick="applyTaskHistoryPreset('trashMove')" th:text="#{page.task_history.btn.preset_trash_move}">휴지통 이동</button>
                <button type="button" class="btn btn-outline btn-sm" onclick="applyTaskHistoryPreset('trashPurge')" th:text="#{page.task_history.btn.preset_trash_purge}">휴지통 만료삭제</button>
                <button type="button" class="btn btn-outline btn-sm" onclick="applyTaskHistoryPreset('trashRestore')" th:text="#{page.task_history.btn.preset_trash_restore}">휴지통 복원</button>
            </div>

            <div id="taskHistoryFilters" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-bottom: 10px;"
                th:attr="data-help-title=#{help.task_history.filters.title},data-help-desc=#{help.task_history.filters.desc},data-help-placement='bottom'">
                <div>
                    <label for="taskHistoryTaskGroup" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_group}">그룹</label>
                    <select id="taskHistoryTaskGroup" style="min-width: 150px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);">
                        <option value="" th:text="#{page.dashboard.js.task_filter_all}">전체</option>
                        <option value="SCHEDULED_TASKS">SCHEDULED_TASKS</option>
                        <option value="MANUAL_TASKS">MANUAL_TASKS</option>
                    </select>
                </div>
                <div>
                    <label for="taskHistoryTaskKey" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_task_key}">작업 키</label>
                          <input id="taskHistoryTaskKey" type="text" style="min-width: 160px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);" placeholder="FILE_CLEANUP"
                              th:attr="data-help-title=#{help.task_history.task_key_input.title},data-help-desc=#{help.task_history.task_key_input.desc},data-help-placement='right'" />
                </div>
                <div>
                    <label for="taskHistoryStatus" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_status}">상태</label>
                    <select id="taskHistoryStatus" style="min-width: 120px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);"
                        th:attr="data-help-title=#{help.task_history.status_filter.title},data-help-desc=#{help.task_history.status_filter.desc},data-help-placement='right'">
                        <option value="" th:text="#{page.dashboard.js.task_filter_all}">전체</option>
                        <option value="SUCCESS" th:text="#{page.dashboard.js.task_status_success}">성공</option>
                        <option value="FAILED" th:text="#{page.dashboard.js.task_status_failed}">실패</option>
                        <option value="SKIPPED" th:text="#{page.dashboard.js.task_status_skipped}">건너뜀</option>
                    </select>
                </div>
                <div>
                    <label for="taskHistoryStartDate" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_start_date}">시작일</label>
                    <input id="taskHistoryStartDate" type="date" style="min-width: 150px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);"
                        th:attr="data-help-title=#{help.task_history.start_date_input.title},data-help-desc=#{help.task_history.start_date_input.desc},data-help-placement='right'" />
                </div>
                <div>
                    <label for="taskHistoryEndDate" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_end_date}">종료일</label>
                    <input id="taskHistoryEndDate" type="date" style="min-width: 150px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);"
                        th:attr="data-help-title=#{help.task_history.end_date_input.title},data-help-desc=#{help.task_history.end_date_input.desc},data-help-placement='right'" />
                </div>
                <div>
                    <label for="taskHistorySortBy" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_sort_by}">정렬 기준</label>
                    <select id="taskHistorySortBy" style="min-width: 140px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);">
                        <option value="createdAt" th:text="#{page.dashboard.js.task_sort_created_at}">생성 시각</option>
                        <option value="completedAt" th:text="#{page.dashboard.js.task_sort_completed_at}">완료 시각</option>
                        <option value="startedAt" th:text="#{page.dashboard.js.task_sort_started_at}">시작 시각</option>
                    </select>
                </div>
                <div>
                    <label for="taskHistorySortDir" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_sort_dir}">정렬 방향</label>
                    <select id="taskHistorySortDir" style="min-width: 120px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);">
                        <option value="desc" th:text="#{page.dashboard.js.task_sort_desc}">내림차순</option>
                        <option value="asc" th:text="#{page.dashboard.js.task_sort_asc}">오름차순</option>
                    </select>
                </div>
                <div>
                    <label for="taskHistoryLimit" style="display:block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;" th:text="#{page.dashboard.js.task_filter_limit}">조회 수</label>
                    <select id="taskHistoryLimit" style="min-width: 90px; padding: 8px; border-radius: 6px; background-color: rgba(0,0,0,0.2); color: var(--text-primary); border: 1px solid var(--border-color);">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>

            <div class="test-buttons" style="margin-bottom: 10px;">
                <button id="btnTaskHistory" class="btn btn-secondary" onclick="loadTaskExecutionHistory()"
                    th:attr="data-help-title=#{help.task_history.load_btn.title},data-help-desc=#{help.task_history.load_btn.desc},data-help-placement='top'"
                    th:text="#{page.dashboard.btn.load_task_history}">수행 이력 보기</button>
                <button id="btnTaskHistoryReset" class="btn btn-outline" type="button" onclick="resetTaskHistoryFilters()"
                    th:attr="data-help-title=#{help.task_history.reset_btn.title},data-help-desc=#{help.task_history.reset_btn.desc},data-help-placement='top'"
                    th:text="#{page.dashboard.js.task_filter_reset}">필터 초기화</button>
            </div>

            <div id="taskHistoryContent" style="margin-top: 10px;"></div>
        </section>
    </main>

    <footer>
        <div class="button-group" style="justify-content: center;">
            <a href="/" class="btn btn-secondary" th:text="#{page.task_history.btn.back_dashboard}">대시보드로</a>
        </div>
        <p style="text-align: center; margin-top: 15px;">&copy; 2026 if-only Project. Muse Agent v<span th:text="${appVersion}">0.0.0</span></p>
    </footer>
</div>

<div id="taskHistoryDetailModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1100; align-items: center; justify-content: center;">
    <div style="width: min(900px, 92vw); max-height: 85vh; overflow: auto; background: #1a1f29; border: 1px solid var(--border-color); border-radius: 10px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <h3 id="taskHistoryDetailTitle" style="margin: 0; color: var(--text-primary);" th:text="#{page.dashboard.js.task_detail_title}">작업 상세</h3>
                <span id="taskHistorySummaryBadge" style="display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; color: var(--text-primary); background: rgba(108,117,125,0.25); border: 1px solid var(--border-color);" th:text="#{page.dashboard.js.task_detail_summary_unknown}">UNKNOWN</span>
            </div>
            <button type="button" class="btn btn-secondary btn-sm" onclick="closeTaskHistoryDetailModal()" th:text="#{page.dashboard.js.task_detail_close}">닫기</button>
        </div>
        <div id="taskHistoryDetailBody" style="margin: 0; overflow: auto; max-height: 60vh;"></div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
const I18N = {
    testing: /*[[#{page.dashboard.js.testing}]]*/ '테스트 중...',
    noTaskHistory: /*[[#{page.dashboard.js.no_task_history}]]*/ '아직 저장된 작업 수행 이력이 없습니다.',
    taskHistoryTitle: /*[[#{page.dashboard.js.task_history_title}]]*/ '최근 작업 수행 이력',
    taskColTask: /*[[#{page.dashboard.js.task_col_task}]]*/ '작업',
    taskColStatus: /*[[#{page.dashboard.js.task_col_status}]]*/ '결과',
    taskColRunAt: /*[[#{page.dashboard.js.task_col_run_at}]]*/ '실행 시각',
    taskColTarget: /*[[#{page.dashboard.js.task_col_target}]]*/ '대상 수',
    taskColSuccess: /*[[#{page.dashboard.js.task_col_success}]]*/ '성공',
    taskColFailure: /*[[#{page.dashboard.js.task_col_failure}]]*/ '실패',
    taskStatusSuccess: /*[[#{page.dashboard.js.task_status_success}]]*/ '성공',
    taskStatusFailed: /*[[#{page.dashboard.js.task_status_failed}]]*/ '실패',
    taskStatusSkipped: /*[[#{page.dashboard.js.task_status_skipped}]]*/ '건너뜀',
    taskDetailExecutionId: /*[[#{page.dashboard.js.task_detail_execution_id}]]*/ '실행 ID',
    taskDetailTaskGroup: /*[[#{page.dashboard.js.task_detail_task_group}]]*/ '작업 그룹',
    taskDetailTaskKey: /*[[#{page.dashboard.js.task_detail_task_key}]]*/ '작업 키',
    taskDetailTaskName: /*[[#{page.dashboard.js.task_detail_task_name}]]*/ '작업 이름',
    taskDetailStatus: /*[[#{page.dashboard.js.task_detail_status}]]*/ '상태',
    taskDetailTarget: /*[[#{page.dashboard.js.task_detail_target}]]*/ '대상 수',
    taskDetailSuccess: /*[[#{page.dashboard.js.task_detail_success}]]*/ '성공 수',
    taskDetailFailure: /*[[#{page.dashboard.js.task_detail_failure}]]*/ '실패 수',
    taskDetailStartedAt: /*[[#{page.dashboard.js.task_detail_started_at}]]*/ '시작 시각',
    taskDetailCompletedAt: /*[[#{page.dashboard.js.task_detail_completed_at}]]*/ '완료 시각',
    taskDetailCreatedAt: /*[[#{page.dashboard.js.task_detail_created_at}]]*/ '저장 시각',
    taskDetailError: /*[[#{page.dashboard.js.task_detail_error}]]*/ '오류 메시지',
    taskDetailMetadata: /*[[#{page.dashboard.js.task_detail_metadata}]]*/ '메타데이터',
    taskDetailEmpty: /*[[#{page.dashboard.js.task_detail_empty}]]*/ '없음',
    taskDetailSummarySuccess: /*[[#{page.dashboard.js.task_detail_summary_success}]]*/ '성공',
    taskDetailSummaryFailed: /*[[#{page.dashboard.js.task_detail_summary_failed}]]*/ '실패',
    taskDetailSummarySkipped: /*[[#{page.dashboard.js.task_detail_summary_skipped}]]*/ '건너뜀',
    taskDetailSummaryUnknown: /*[[#{page.dashboard.js.task_detail_summary_unknown}]]*/ '알 수 없음'
};
window.MUSE_TOUR_I18N = {
    guideTitle: /*[[#{tour.muse.guide.title}]]*/ '가이드 다시 보기',
    guideDesc: /*[[#{tour.muse.guide.desc}]]*/ '언제든 이 버튼으로 투어를 다시 시작할 수 있습니다.',
    taskHistoryPageTitle: /*[[#{tour.muse.task_history_page.title}]]*/ '작업 이력 화면',
    taskHistoryPageDesc: /*[[#{tour.muse.task_history_page.desc}]]*/ '스케줄과 수동 작업의 실행 결과를 필터링해 조회합니다.',
    taskHistoryPresetsTitle: /*[[#{tour.muse.task_history_presets.title}]]*/ '빠른 프리셋',
    taskHistoryPresetsDesc: /*[[#{tour.muse.task_history_presets.desc}]]*/ '자주 쓰는 작업 그룹과 키 조합을 한 번에 적용합니다.',
    taskHistoryFiltersTitle: /*[[#{tour.muse.task_history_filters.title}]]*/ '상세 필터',
    taskHistoryFiltersDesc: /*[[#{tour.muse.task_history_filters.desc}]]*/ '상태, 기간, 정렬 조건을 조합해 원하는 이력만 조회합니다.',
    taskHistoryLoadTitle: /*[[#{tour.muse.task_history_load.title}]]*/ '이력 조회',
    taskHistoryLoadDesc: /*[[#{tour.muse.task_history_load.desc}]]*/ '현재 필터 조건으로 최근 작업 이력을 불러옵니다.'
};
/*]]>*/
</script>
<script th:src="@{/js/task-history.js}"></script>
<script th:src="@{/vendor/driverjs/driver.js.iife.js}"></script>
<script th:src="@{/js/onboarding-tour.js}"></script>
<script th:src="@{/js/context-help.js}"></script>
</body>
</html>
